<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation"></script>
</head>
<body>

<div class="graficos">

    <div class="bloco-grafico_1">
        <p class="titulo">Distribuição das Guildas</p>
        <canvas id="grafico_1"></canvas>
        <button id="botao-sair" class="botao-sair" onclick="logout()">Sair</button>
    </div>

   
    <div>
        
        <div class="bloco-brasao">
            <img id="brasao" src="/public/Portas/imagens/" alt="brasão da guilda">
            <p id="nome-guilda"></p>
        </div>
        
        <div class="bloco-grafico_2">
            <p class="titulo">Sua Afinidade</p>
            <canvas id="grafico_2"></canvas>
        </div>
    </div>

    

</div>
<script>

//busca dados na tabaela quiz 
fetch('/quiz/resultados')

    //retorna  com a  resposta e guarda no parametro
    .then(function(resposta) {

        // verifica se o erro foi encontrado
        if (!resposta.ok) {

            // retorna resposta em formato de texto caso tenha erro
            return resposta.text().then(function(text) {
                throw new Error('HTTP ' + resposta.status + ': ' + text); // => tipo do errp e status
            });
        }
        return resposta.json(); 
    })
    // retorna resposta guardando no parametro dados 
    .then(function(dados) {


       var totals = {};

        
        dados.forEach(function(item) {
    
        
        var chave = (item.guilda || '').toString().trim().toLowerCase();
    
        
        totals[chave] = item.total;
    });

        var labels = [
            'O Arquivista de Pergaminhos',
            'O Antologista de Almas',
            'Viajante de Reinos',
            'Decifrador de Grimórios'
        ];

        function acharTotal(label) {
            var normalizedLabel = label.toLowerCase();
            if (totals[normalizedLabel] !== undefined) {
                return totals[normalizedLabel];
            }

            for (var chave in totals) {
                if (chave && (normalizedLabel.includes(chave) || chave.includes(normalizedLabel))) {
                    return totals[chave];
                }
            }

            return 0;
        }

        var totais = labels.map(acharTotal);  
        
   

        var canvas = document.getElementById('grafico_1');
        var ctx = canvas.getContext('2d');
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: totais,
                    backgroundColor: ['#e0ab38', '#70045e', '#1b2180', '#450173'],
                    borderWidth: 0
                }]
            }
        });
    })
    .catch(function(erro) {
        console.error('Erro ao carregar resultados do quiz:', erro);
    });

var idUsuario = sessionStorage.ID_USUARIO;

function exibirGuilda(guilda) {
    var brasao = document.getElementById('brasao');
    var nomeGuilda = document.getElementById('nome-guilda');


    if (!brasao || !nomeGuilda) {

        console.error('Elementos de guilda não encontrados no DOM.');
        return;
    }

    if (guilda.includes('Arquivista')) {

        brasao.src = '../Portas/imagens/aquivista-brasao.png'

        nomeGuilda.textContent = 'O Arquivista de Pergaminhos'

    } else if (guilda.includes('Antologista')) {

        brasao.src = '../Portas/imagens/almas-brasao.png'
        nomeGuilda.textContent = 'O Antologista de Almas'
    
    } else if (guilda.includes('Viajante')) {

       brasao.src = '../Portas/imagens/viajante-brasao.png'
        nomeGuilda.textContent = 'Viajante de Reinos'

    } else if (guilda.includes('Decifrador')) {

        brasao.src = '../Portas/imagens/decifrador-brasao.png'
        nomeGuilda.textContent = 'Decifrador de Grimórios'

    } else {
        
        brasao.src = '../Portas/imagens/almas-brasao.png'
        nomeGuilda.textContent = 'Guilda desconhecida'
    }
}

if (!idUsuario) {
    console.warn('ID_USUARIO não encontrado em sessionStorage. O gráfico de barras não será exibido até o login.');
    exibirGuilda('');
} else {
    fetch(`/quiz/resultados/${idUsuario}`)
        .then(resposta => resposta.json())
        .then(dados => {

    var guilda = (dados[0].guilda || '').toString()
    exibirGuilda(guilda)
    
    var pontinhos = dados[0].pontos_por_questao;
    var pontos = JSON.parse(pontinhos || '[1,1,1,1,1]');


    var vetor = pontos.map(function(p) { return p - 1; });
    
    console.log('Vetor de guildas antes do cálculo:', vetor);

  
    var contagem = [0,0,0,0]

    vetor.forEach(posicao => {
        contagem[posicao]++
    })

    var porcentagens = [
        (contagem[0] / 5) * 100,
        (contagem[1] / 5) * 100,
        (contagem[2] / 5) * 100,
        (contagem[3] / 5) * 100
    ]

      console.log('Vetor de guildas:', vetor);
      console.log('Contagem:', contagem);

    var ctx2 = document.getElementById('grafico_2').getContext('2d')

    new Chart(ctx2, {
        type: 'bar',
        data: {
            labels: ['Arquivista', 'Antologista', 'Viajante', 'Decifrador'],
            datasets: [{
                label: 'Compatibilidade (%)',
                data: porcentagens,
                backgroundColor: ['#e0ab38', '#70045e', '#1b2180', '#450173']
            }]
        },
        options: {
            scales: {
                y: {
                    beginAtZero: true,
                    max: 100
                }
            }
        }
    })

    })
    .catch(erro => console.error('Erro:', erro))

        }

function logout() {
    sessionStorage.clear();
    window.location.href = '/Tela inicial/index.html';
}

Chart.defaults.font.family = "Garden";
Chart.defaults.font.size = 14;

</script>
</body>
</html>
